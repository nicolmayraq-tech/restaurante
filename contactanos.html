<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title><link rel="stylesheet" href="style3.css">
</head>
<body>
    <section class="contacto">
        <div class="contacto-imagen">
            <h1>RESTAURANTE</h1>
            <h1>BOLIVIANO</h1>
            <p>ORURO - BOLIVIA</p>
        </div>
    <div class="contacto-form">
        <h2>Contáctanos</h2>
        <p>Llena el formulario para hacer tu reserva</p>

        <label>Nombres</label>
        <input type="text" placeholder="Introduce tu nombre">

        <label>Apellidos</label>
        <input type="text" placeholder="Introduce tus apellidos">

        <label>Email</label>
        <input type="email" placeholder="Introduce tu correo electrónico">

        <label>Celular</label>
        <input type="tel" placeholder="Introduce tu número de celular">

        <label>Mensaje</label>
        <textarea placeholder="¿En qué podemos ayudarte?"></textarea>

        <button type="submit">Enviar</button>
    </div>
</section>
</body>
</html>
